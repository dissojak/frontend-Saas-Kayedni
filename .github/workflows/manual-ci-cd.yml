name: Manual CI/CD (Frontend)

on:
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "Run deploy placeholder"
        required: false
        default: false
        type: boolean
  # to allow CI/CD to run auttomatically on main push.
  #####################################################
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  #####################################################

concurrency:
  group: frontend-manual-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy Placeholder
    runs-on: ubuntu-latest
    needs: ci
    if: ${{ inputs.run_deploy }}
    steps:
      - name: Deployment disabled by default
        run: |
          echo "Manual deploy placeholder."
          echo "Add your real deployment steps/secrets when ready for production."
